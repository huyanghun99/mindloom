services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mindloom-db
    environment:
      POSTGRES_USER: mindloom
      POSTGRES_PASSWORD: mindloom
      POSTGRES_DB: mindloom
    ports:
      - "5432:5432"
    volumes:
      - mindloom_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindloom -d mindloom"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindloom-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://mindloom:mindloom@db:5432/mindloom
      PORT: 39280
      UPLOAD_DIR: /data/uploads
    ports:
      - "39280:39280"
    volumes:
      - mindloom_uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  mindloom_pg:
  mindloom_uploads:
